<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarnel Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        /* Contenedor de botones de idioma */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        /* Botones blancos con flechita azul */
        .lang-selector {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 180px;
            color: #1a73e8;
            font-weight: 500;
            font-size: 15px;
        }

        .lang-selector::after {
            content: "";
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid #1a73e8;
            margin-left: 10px;
        }

        /* Botón de flecha de intercambio */
        .swap-btn {
            background: none;
            border: none;
            color: #5f6368;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .swap-btn:hover {
            background-color: #f1f3f4;
        }

        /* Cuadrícula de traducción */
        .translation-grid {
            display: flex;
            gap: 12px;
        }

        .box {
            flex: 1;
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            min-height: 250px;
            box-sizing: border-box;
        }

        .box-output {
            background-color: #f8f9fa; /* Color gris suave para el resultado */
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            padding: 20px;
            font-size: 28px;
            color: #3c4043;
            resize: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea::placeholder {
            color: #70757a;
        }

        @media (max-width: 768px) {
            .translation-grid {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-controls">
        <div class="lang-selector" id="label-left">Español</div>
        
        <button class="swap-btn" onclick="intercambiarIdiomas()" title="Intercambiar idiomas">⇄</button>
        
        <div class="lang-selector" id="label-right">Zarnel</div>
    </div>

    <div class="translation-grid">
        <div class="box">
            <textarea id="input-text" placeholder="Escribe algo aquí..." oninput="ejecutarTraduccion()"></textarea>
        </div>
        <div class="box box-output">
            <textarea id="output-text" placeholder="Traducción" readonly></textarea>
        </div>
    </div>
</div>

<script>
    // Tu abecedario Zarnel
    const diccionario = {
        'a':'va','e':'ve','i':'vi','o':'vo','u':'vu',
        'b':'ca','c':'ce','d':'ci','f':'co','g':'cu','h':'da','j':'de','k':'di','l':'do','m':'du','n':'fa','ñ':'fe','p':'fi','q':'fo','r':'fu','s':'ga','t':'ge','v':'gi','w':'go','x':'gu','y':'ha','z':'he'
    };

    // Diccionario invertido para traducir de Zarnel a Español
    const diccionarioInverso = {};
    for (let letra in diccionario) {
        diccionarioInverso[diccionario[letra]] = letra;
    }

    // Variable para saber en qué dirección traducimos
    let esEspañolAZarnel = true;

    // Función para limpiar tildes y pasar a minúsculas
    function limpiarTexto(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function ejecutarTraduccion() {
        const entrada = document.getElementById('input-text').value;
        const salida = document.getElementById('output-text');
        
        if (esEspañolAZarnel) {
            // Lógica: Español -> Zarnel
            let textoLimpio = limpiarTexto(entrada);
            let resultado = "";
            for (let letra of textoLimpio) {
                resultado += diccionario[letra] || letra;
            }
            salida.value = resultado;
        } else {
            // Lógica: Zarnel -> Español
            let textoZar = entrada.toLowerCase();
            let resultado = "";
            let i = 0;
            while (i < textoZar.length) {
                let par = textoZar.substr(i, 2);
                if (diccionarioInverso[par]) {
                    resultado += diccionarioInverso[par];
                    i += 2;
                } else {
                    resultado += textoZar[i];
                    i += 1;
                }
            }
            salida.value = resultado;
        }
    }

    // Función que se activa al presionar la flecha ⇄
    function intercambiarIdiomas() {
        // Cambiamos el modo
        esEspañolAZarnel = !esEspañolAZarnel;
        
        // Intercambiamos los nombres de los botones
        const labelIzq = document.getElementById('label-left');
        const labelDer = document.getElementById('label-right');
        const tempLabel = labelIzq.innerText;
        labelIzq.innerText = labelDer.innerText;
        labelDer.innerText = tempLabel;

        // Pasamos el texto de la derecha a la izquierda para poder traducir de vuelta
        const inputField = document.getElementById('input-text');
        const outputField = document.getElementById('output-text');
        
        const textoParaMover = outputField.value;
        inputField.value = textoParaMover;
        
        // Ejecutamos la traducción con el nuevo modo
        ejecutarTraduccion();
    }
</script>

</body>
</html>
