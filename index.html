<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Zarnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        /* Selectores de idioma estilo Google */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .lang-selector {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 180px;
            color: #1a73e8;
            font-weight: 500;
            font-size: 15px;
            cursor: default;
        }

        .lang-selector::after {
            content: "";
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid #1a73e8;
            margin-left: 10px;
        }

        .swap-btn {
            background: none;
            border: none;
            color: #5f6368;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .swap-btn:hover {
            background-color: #f1f3f4;
        }

        /* Contenedor de las cajas de texto */
        .translation-grid {
            display: flex;
            gap: 12px;
        }

        .box {
            flex: 1;
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            min-height: 220px;
            box-sizing: border-box;
        }

        .box-output {
            background-color: #f8f9fa; /* Color gris de la imagen */
        }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            padding: 20px;
            font-size: 28px; /* Fuente grande como la imagen */
            color: #3c4043;
            resize: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            box-sizing: border-box;
        }

        textarea::placeholder {
            color: #70757a;
        }

        @media (max-width: 768px) {
            .translation-grid {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-controls">
        <div class="lang-selector" id="label-left">Español</div>
        <button class="swap-btn" onclick="intercambiar()">⇄</button>
        <div class="lang-selector" id="label-right">Zarnel</div>
    </div>

    <div class="translation-grid">
        <div class="box">
            <textarea id="input-text" placeholder="Escribe algo aquí..." oninput="traducir()"></textarea>
        </div>
        <div class="box box-output">
            <textarea id="output-text" placeholder="Traducción" readonly></textarea>
        </div>
    </div>
</div>

<script>
    const abecedarioZarnel = {
        'a':'va','e':'ve','i':'vi','o':'vo','u':'vu',
        'b':'ca','c':'ce','d':'ci','f':'co','g':'cu','h':'da','j':'de','k':'di','l':'do','m':'du',
        'n':'fa','ñ':'fe','p':'fi','q':'fo','r':'fu','s':'ga','t':'ge','v':'gi','w':'go','x':'gu','y':'ha','z':'he'
    };

    const reversoZarnel = {};
    for (let letra in abecedarioZarnel) { reversoZarnel[abecedarioZarnel[letra]] = letra; }

    let modoEspañol = true;

    function limpiar(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function traducir() {
        const entrada = document.getElementById('input-text').value;
        const salida = document.getElementById('output-text');
        
        if (modoEspañol) {
            let textoLimpio = limpiar(entrada);
            let resultado = "";
            for (let letra of textoLimpio) {
                resultado += abecedarioZarnel[letra] || letra;
            }
            salida.value = resultado;
        } else {
            let textoZar = entrada.toLowerCase();
            let resultado = "";
            let i = 0;
            while (i < textoZar.length) {
                let par = textoZar.substr(i, 2);
                if (reversoZarnel[par]) {
                    resultado += reversoZarnel[par];
                    i += 2;
                } else {
                    resultado += textoZar[i];
                    i += 1;
                }
            }
            salida.value = resultado;
        }
    }

    function intercambiar() {
        modoEspañol = !modoEspañol;
        
        const labelIzq = document.getElementById('label-left');
        const labelDer = document.getElementById('label-right');
        const tempLabel = labelIzq.innerText;
        labelIzq.innerText = labelDer.innerText;
        labelDer.innerText = tempLabel;

        const input = document.getElementById('input-text');
        const output = document.getElementById('output-text');
        const tempText = input.value;
        input.value = output.value;
        
        traducir();
    }
</script>

</body>
</html>
