<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zarnel Translator</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            justify-content: center;
            padding-top: 40px;
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            padding: 20px;
        }

        .header-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .lang-selector {
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 10px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-width: 180px;
            color: #1a73e8;
            font-weight: 500;
            font-size: 15px;
        }

        .lang-selector::after {
            content: "";
            border-left: 5px solid transparent;
            border-right: 5px solid transparent;
            border-top: 5px solid #1a73e8;
            margin-left: 10px;
        }

        .swap-btn {
            background: none;
            border: none;
            color: #5f6368;
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            border-radius: 50%;
            transition: background 0.2s;
        }

        .swap-btn:hover { background-color: #f1f3f4; }

        .translation-grid {
            display: flex;
            gap: 12px;
        }

        .box {
            flex: 1;
            background: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            position: relative; /* Para que el botón se posicione respecto a la caja */
            overflow: hidden;
        }

        .box-output { background-color: #f8f9fa; }

        textarea {
            width: 100%;
            height: 100%;
            border: none;
            /* Aumentamos el padding inferior para que el texto nunca toque el botón */
            padding: 25px 25px 70px 25px; 
            font-size: 28px;
            color: #3c4043;
            resize: none;
            outline: none;
            background: transparent;
            font-family: inherit;
            box-sizing: border-box;
            caret-color: #1a73e8; /* Cursor azul para que se vea mejor */
        }

        textarea::placeholder { color: #70757a; }

        .copy-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: white; /* Fondo sólido para que no se mezcle con el cursor */
            border: 1px solid #dadce0;
            color: #5f6368;
            cursor: pointer;
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            z-index: 10; /* Siempre por encima del texto */
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .copy-btn:hover {
            background-color: #f8f9fa;
            color: #1a73e8;
            border-color: #1a73e8;
        }

        .copy-btn .material-icons-outlined { font-size: 22px; }

        #toast {
            visibility: hidden;
            min-width: 150px;
            background-color: #323232;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 12px;
            position: fixed;
            z-index: 100;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
        }

        #toast.show { visibility: visible; animation: fadein 0.5s, fadeout 0.5s 2.5s; }

        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }

        @media (max-width: 768px) { .translation-grid { flex-direction: column; } }
    </style>
</head>
<body>

<div class="main-container">
    <div class="header-controls">
        <div class="lang-selector" id="label-left">Español</div>
        <button class="swap-btn" onclick="intercambiarIdiomas()">⇄</button>
        <div class="lang-selector" id="label-right">Zarnel</div>
    </div>

    <div class="translation-grid">
        <div class="box">
            <textarea id="input-text" placeholder="Escribe algo aquí..." oninput="ejecutarTraduccion()"></textarea>
        </div>
        <div class="box box-output">
            <textarea id="output-text" placeholder="Traducción" readonly></textarea>
            <button class="copy-btn" onclick="copiarAlPortapapeles()" title="Copiar traducción">
                <span class="material-icons-outlined">content_copy</span>
            </button>
        </div>
    </div>
</div>

<div id="toast">Texto copiado</div>

<script>
    const diccionario = {
        'a':'va','e':'ve','i':'vi','o':'vo','u':'vu',
        'b':'ca','c':'ce','d':'ci','f':'co','g':'cu','h':'da','j':'de','k':'di','l':'do','m':'du','n':'fa','ñ':'fe','p':'fi','q':'fo','r':'fu','s':'ga','t':'ge','v':'gi','w':'go','x':'gu','y':'ha','z':'he'
    };
    const diccionarioInverso = {};
    for (let letra in diccionario) { diccionarioInverso[diccionario[letra]] = letra; }
    let esEspañolAZarnel = true;

    function limpiarTexto(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function ejecutarTraduccion() {
        const entrada = document.getElementById('input-text').value;
        const salida = document.getElementById('output-text');
        if (esEspañolAZarnel) {
            let textoLimpio = limpiarTexto(entrada);
            let resultado = "";
            for (let letra of textoLimpio) { resultado += diccionario[letra] || letra; }
            salida.value = resultado;
        } else {
            let textoZar = entrada.toLowerCase();
            let resultado = "";
            let i = 0;
            while (i < textoZar.length) {
                let par = textoZar.substr(i, 2);
                if (diccionarioInverso[par]) { resultado += diccionarioInverso[par]; i += 2; }
                else { resultado += textoZar[i]; i += 1; }
            }
            salida.value = resultado;
        }
    }

    function intercambiarIdiomas() {
        esEspañolAZarnel = !esEspañolAZarnel;
        const labelIzq = document.getElementById('label-left');
        const labelDer = document.getElementById('label-right');
        const tempLabel = labelIzq.innerText;
        labelIzq.innerText = labelDer.innerText;
        labelDer.innerText = tempLabel;
        const inputField = document.getElementById('input-text');
        const outputField = document.getElementById('output-text');
        const textoParaMover = outputField.value;
        inputField.value = textoParaMover;
        ejecutarTraduccion();
    }

    function copiarAlPortapapeles() {
        const copyText = document.getElementById("output-text");
        if (!copyText.value) return;
        navigator.clipboard.writeText(copyText.value).then(() => {
            const toast = document.getElementById("toast");
            toast.className = "show";
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        });
    }
</script>

</body>
</html>
