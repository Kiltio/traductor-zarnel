<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Zarnel - Estilo Google</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary-color: #1a73e8; /* Azul Google */
            --bg-color: #f8f9fa;
            --border-color: #dadce0;
            --text-color: #202124;
            --textarea-bg: #fff;
        }

        body {
            font-family: 'Roboto', arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Cabecera falsa de Google */
        header {
            width: 100%;
            background: #fff;
            padding: 15px 30px;
            border-bottom: 1px solid var(--border-color);
            box-sizing: border-box;
            display: flex;
            align-items: center;
        }
        
        header img {
            height: 24px;
            margin-right: 10px;
        }

        header span {
            font-size: 22px;
            color: #5f6368;
        }

        .main-container {
            width: 100%;
            max-width: 1280px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Barra de selección de idiomas */
        .language-bar {
            background: #fff;
            border: 1px solid var(--border-color);
            border-bottom: none;
            border-radius: 8px 8px 0 0;
            display: grid;
            grid-template-columns: 1fr 50px 1fr;
            align-items: center;
            height: 48px;
        }

        .lang-name {
            text-align: center;
            font-weight: 500;
            color: #5f6368;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .lang-name.active {
            color: var(--primary-color);
        }

        /* El botón de la flecha */
        .swap-button {
            background: none;
            border: none;
            color: #5f6368;
            cursor: pointer;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.2s;
            margin: 0 auto;
        }

        .swap-button:hover {
            background-color: #f1f3f4;
            color: var(--text-color);
        }

        .swap-button .material-icons {
            font-size: 20px;
        }

        /* Área de las cajas de texto */
        .translation-cards {
            display: grid;
            grid-template-columns: 1fr;
            border: 1px solid var(--border-color);
            border-radius: 0 0 8px 8px;
            background: #fff;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,.3), 0 1px 3px 1px rgba(60,64,67,.15);
        }

        /* Separador vertical estilo Google (oculto en móvil) */
        @media (min-width: 720px) {
            .translation-cards {
                grid-template-columns: 1fr 1px 1fr;
            }
            .vertical-divider {
                background-color: var(--border-color);
                width: 1px;
                height: 100%;
            }
        }

        @media (max-width: 719px) {
            .vertical-divider { display: none; }
        }

        .card {
            padding: 20px;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 150px;
            border: none;
            resize: none;
            outline: none;
            font-size: 16px;
            color: var(--text-color);
            padding: 0;
            font-family: inherit;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            color: #5f6368;
            font-size: 12px;
        }

        /* Botón de copiar */
        .icon-button {
            background: none;
            border: none;
            color: #5f6368;
            cursor: pointer;
            border-radius: 50%;
            padding: 8px;
        }
        .icon-button:hover { background-color: #f1f3f4; }
        .icon-button .material-icons { font-size: 18px; }

    </style>
</head>
<body>

<header>
    <img src="https://www.gstatic.com/images/branding/googlelogo/svg/googlelogo_clr_74x24px.svg" alt="Google Logo Falso">
    <span>Zarnel</span>
</header>

<div class="main-container">
    
    <div class="language-bar">
        <div class="lang-name active" id="langInputName">Español</div>
        
        <button class="swap-button" onclick="intercambiarIdiomas()" title="Intercambiar idiomas">
            <span class="material-icons">swap_horiz</span>
        </button>
        
        <div class="lang-name active" id="langOutputName">Zarnel</div>
    </div>

    <div class="translation-cards">
        
        <div class="card">
            <textarea id="inputText" placeholder="Escribe para traducir..." oninput="detectarYTraducir()"></textarea>
            <div class="card-footer">
                <span id="charCountInput">0</span>
                </div>
        </div>

        <div class="vertical-divider"></div>

        <div class="card" style="background-color: #f1f3f4;">
            <textarea id="outputText" readonly placeholder="Traducción..."></textarea>
            <div class="card-footer">
                <span></span> <button class="icon-button" onclick="copiarTraduccion()" title="Copiar traducción">
                    <span class="material-icons">content_copy</span>
                </button>
            </div>
        </div>
    </div>

</div>

<script>
    // Tu Diccionario Zarnel (intacto)
    const diccionario = {
        'a':'va','e':'ve','i':'vi','o':'vo','u':'vu',
        'b':'ca','c':'ce','d':'ci','f':'co','g':'cu','h':'da','j':'de','k':'di','l':'do','m':'du','n':'fa','ñ':'fe','p':'fi','q':'fo','r':'fu','s':'ga','t':'ge','v':'gi','w':'go','x':'gu','y':'ha','z':'he'
    };

    // Diccionario invertido (intacto)
    const invDiccionario = {};
    for(let letra in diccionario) { invDiccionario[diccionario[letra]] = letra; }

    // Estado del traductor: true = Español->Zarnel, false = Zarnel->Español
    let modoEspañolAZarnel = true;

    // Elementos del DOM
    const inputTextDom = document.getElementById('inputText');
    const outputTextDom = document.getElementById('outputText');
    const langInputNameDom = document.getElementById('langInputName');
    const langOutputNameDom = document.getElementById('langOutputName');
    const charCountInputDom = document.getElementById('charCountInput');

    // Función de limpieza de reglas 2 y 3 (intacta)
    function limpiarTexto(texto) {
        return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    // Lógica de traducción principal
    function detectarYTraducir() {
        const texto = inputTextDom.value;
        charCountInputDom.innerText = texto.length; // Actualizar contador

        if (texto.trim() === "") {
            outputTextDom.value = "";
            return;
        }

        if (modoEspañolAZarnel) {
            // Lógica Español -> Zarnel (Regla 4 y 5)
            let textoLimpio = limpiarTexto(texto);
            let resultado = "";
            for (let letra of textoLimpio) {
                resultado += diccionario[letra] || letra; 
            }
            outputTextDom.value = resultado;
        } else {
            // Lógica Zarnel -> Español (reconoce pares de letras)
            let textoZar = texto.toLowerCase();
            let resultado = "";
            let i = 0;
            while (i < textoZar.length) {
                let par = textoZar.substr(i, 2);
                if (invDiccionario[par]) {
                    resultado += invDiccionario[par];
                    i += 2;
                } else {
                    resultado += textoZar[i];
                    i += 1;
                }
            }
            outputTextDom.value = resultado;
        }
    }

    // NUEVA FUNCIÓN: Intercambiar idiomas (Botón flecha)
    function intercambiarIdiomas() {
        modoEspañolAZarnel = !modoEspañolAZarnel; // Cambiar el estado

        if (modoEspañolAZarnel) {
            langInputNameDom.innerText = "Español";
            langOutputNameDom.innerText = "Zarnel";
            inputTextDom.placeholder = "Escribe para traducir...";
        } else {
            langInputNameDom.innerText = "Zarnel";
            langOutputNameDom.innerText = "Español";
            inputTextDom.placeholder = "Gefe vegafuvebava...";
        }

        // Intercambiar los textos actuales si hay algo escrito
        const textoEntradaActual = inputTextDom.value;
        const textoSalidaActual = outputTextDom.value;
        
        inputTextDom.value = textoSalidaActual;
        outputTextDom.value = textoEntradaActual;
        
        // Volver a traducir para asegurar coherencia
        detectarYTraducir();
    }

    // EXTRA: Función para copiar el texto
    function copiarTraduccion() {
        outputTextDom.select();
        document.execCommand('copy');
        alert("¡Texto copiado!");
    }
</script>

</body>
</html>
