<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traductor Zarnel</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Roboto', sans-serif;
            background-color: #ffffff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #3c4043;
        }

        .main-wrapper {
            width: 100%;
            max-width: 1000px;
            margin-top: 50px;
            padding: 20px;
        }

        /* Contenedor de los selectores de idioma y flecha */
        .controls {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            margin-bottom: 8px;
        }

        .lang-box {
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 10px 15px;
            min-width: 150px;
            font-weight: 500;
            color: #1a73e8;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: default;
        }

        .lang-box::after {
            content: '▼';
            font-size: 10px;
            margin-left: 10px;
        }

        .swap-icon {
            cursor: pointer;
            color: #5f6368;
            font-size: 20px;
            padding: 5px;
            transition: background 0.2s;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .swap-icon:hover {
            background-color: #f1f3f4;
        }

        /* Contenedor de las cajas de texto */
        .translator-container {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        .box {
            flex: 1;
            position: relative;
        }

        textarea {
            width: 100%;
            height: 180px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 20px;
            font-size: 24px;
            color: #3c4043;
            resize: none;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        #output-text {
            background-color: #f8f9fa;
        }

        /* Estilo del placeholder como el de tu imagen */
        textarea::placeholder {
            color: #70757a;
            font-weight: 400;
        }

        .mic-icon {
            position: absolute;
            bottom: 15px;
            left: 20px;
            color: #5f6368;
            font-size: 20px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .translator-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div class="controls">
        <div class="lang-box" id="label-left">Español</div>
        <div class="swap-icon" onclick="swap()">⇄</div>
        <div class="lang-box" id="label-right">Zarnel</div>
    </div>

    <div class="translator-container">
        <div class="box">
            <textarea id="input-text" placeholder="Escribe, habla o toma fotos" oninput="translate()"></textarea>
            <div class="mic-icon">🎤</div>
        </div>
        <div class="box">
            <textarea id="output-text" placeholder="Traducción" readonly></textarea>
        </div>
    </div>
</div>

<script>
    const dictionary = {
        'a':'va','e':'ve','i':'vi','o':'vo','u':'vu',
        'b':'ca','c':'ce','ci':'ci','d':'ci','f':'co','g':'cu','h':'da','j':'de','k':'di','l':'do','m':'du','n':'fa','ñ':'fe','p':'fi','q':'fo','r':'fu','s':'ga','t':'ge','v':'gi','w':'go','x':'gu','y':'ha','z':'he'
    };

    const reverseDict = {};
    for (let key in dictionary) { reverseDict[dictionary[key]] = key; }

    let isSpanishToZarnel = true;

    function cleanText(text) {
        return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    }

    function translate() {
        const input = document.getElementById('input-text').value;
        const output = document.getElementById('output-text');
        
        if (isSpanishToZarnel) {
            let cleanInput = cleanText(input);
            let result = "";
            for (let char of cleanInput) {
                result += dictionary[char] || char;
            }
            output.value = result;
        } else {
            let zarInput = input.toLowerCase();
            let result = "";
            let i = 0;
            while (i < zarInput.length) {
                let pair = zarInput.substr(i, 2);
                if (reverseDict[pair]) {
                    result += reverseDict[pair];
                    i += 2;
                } else {
                    result += zarInput[i];
                    i += 1;
                }
            }
            output.value = result;
        }
    }

    function swap() {
        isSpanishToZarnel = !isSpanishToZarnel;
        
        // Intercambiar etiquetas
        const left = document.getElementById('label-left');
        const right = document.getElementById('label-right');
        const tempLabel = left.innerText;
        left.innerText = right.innerText;
        right.innerText = tempLabel;

        // Intercambiar contenido de las cajas
        const inputField = document.getElementById('input-text');
        const outputField = document.getElementById('output-text');
        const tempText = inputField.value;
        inputField.value = outputField.value;
        
        translate();
    }
</script>

</body>
</html>
